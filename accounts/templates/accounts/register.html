<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    padding:40px;
    border-radius:10px;
    width:350px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:5px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:12px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.link{
    text-align:center;
    margin-top:15px;
}

a{
    text-decoration:none;
    color:#2563eb;
}

</style>
</head>

<body>

<div class="container">

<h2>Create Account</h2>

<form method="POST">
{% csrf_token %}

{{ form.as_p }}

<button type="submit">Register</button>

</form>

<div class="link">
Already have an account?  
<a href="/accounts/login/">Login</a>
</div>

</div>

</body>
</html>
