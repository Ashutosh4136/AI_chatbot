<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#1e293b,#0f172a);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    padding:40px;
    border-radius:10px;
    width:350px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:5px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:12px;
    background:#22c55e;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#16a34a;
}

.link{
    text-align:center;
    margin-top:15px;
}

a{
    text-decoration:none;
    color:#2563eb;
}

</style>
</head>

<body>

<div class="container">

<h2>Login</h2>

<form method="POST">

{% csrf_token %}
{{ form.as_p }}

<button type="submit">Login</button>

</form>

<div class="link">
Don't have an account?  
<a href="/accounts/register/">Register</a>
</div>

</div>

</body>
</html>
